 <!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новый пароль - Movie Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; color: #f1f5f9; }
    .card { background: #1e293b; padding: 32px; border-radius: 16px; border: 1px solid #334155; width: 100%; max-width: 400px; }
    h1 { font-size: 20px; text-align: center; margin-bottom: 8px; }
    .sub { color: #94a3b8; font-size: 14px; text-align: center; margin-bottom: 24px; }
    .inp { margin-bottom: 16px; }
    label { display: block; color: #cbd5e1; font-size: 13px; margin-bottom: 6px; }
    input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #475569; border-radius: 8px; color: #fff; font-size: 14px; }
    input:focus { outline: none; border-color: #3b82f6; }
    button { width: 100%; padding: 12px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); border: none; border-radius: 8px; color: #fff; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .err { background: rgba(220,38,38,0.1); border: 1px solid #dc2626; color: #fca5a5; padding: 10px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
    .ok { background: rgba(34,197,94,0.1); border: 1px solid #22c55e; color: #86efac; padding: 10px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; text-align: center; }
    .link { display: block; text-align: center; margin-top: 20px; color: #60a5fa; text-decoration: none; font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔐 Новый пароль</h1>
    <p class="sub">Введите новый пароль для вашего аккаунта</p>
    <div id="msg"></div>
    <form id="form">
      <div class="inp"><label>Новый пароль</label><input type="password" id="p1" required minlength="6"></div>
      <div class="inp"><label>Повторите пароль</label><input type="password" id="p2" required></div>
      <button type="submit" id="btn">Сохранить пароль</button>
    </form>
    <a href="/" class="link">← Вернуться на главную</a>
  </div>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
    const supabase = createClient(
      import.meta.env.VITE_SUPABASE_URL || 'https://fhcvikryaejtikcwjciu.supabase.co',
      import.meta.env.VITE_SUPABASE_ANON_KEY || 'your-anon-key'
    )
    const form = document.getElementById('form')
    const msg = document.getElementById('msg')
    const btn = document.getElementById('btn')
    form.addEventListener('submit', async e => {
      e.preventDefault()
      const p1 = document.getElementById('p1').value
      const p2 = document.getElementById('p2').value
      if (p1 !== p2) { msg.innerHTML = '<div class="err">Пароли не совпадают</div>'; return }
      btn.disabled = true; btn.textContent = 'Сохранение...'
      const { error } = await supabase.auth.updateUser({ password: p1 })
      if (error) { msg.innerHTML = `<div class="err">Ошибка: ${error.message}</div>`; btn.disabled = false; btn.textContent = 'Сохранить пароль' }
      else { msg.innerHTML = '<div class="ok">✅ Пароль изменён! Перенаправляем...</div>'; setTimeout(() => location.href = '/', 2000) }
    })
  </script>
</body>
</html>
