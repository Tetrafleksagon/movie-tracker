<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New password - Movie Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; color: #f1f5f9; }
    .card { background: #1e293b; padding: 32px; border-radius: 16px; border: 1px solid #334155; width: 100%; max-width: 400px; }
    h1 { font-size: 20px; text-align: center; margin-bottom: 8px; }
    .sub { color: #94a3b8; font-size: 14px; text-align: center; margin-bottom: 24px; }
    .inp { margin-bottom: 16px; }
    label { display: block; color: #cbd5e1; font-size: 13px; margin-bottom: 6px; }
    input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #475569; border-radius: 8px; color: #fff; font-size: 14px; }
    input:focus { outline: none; border-color: #3b82f6; }
    button { width: 100%; padding: 12px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); border: none; border-radius: 8px; color: #fff; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .err { background: rgba(220,38,38,0.1); border: 1px solid #dc2626; color: #fca5a5; padding: 10px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
    .ok { background: rgba(34,197,94,0.1); border: 1px solid #22c55e; color: #86efac; padding: 10px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; text-align: center; }
    .link { display: block; text-align: center; margin-top: 20px; color: #60a5fa; text-decoration: none; font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title">🔐 New password</h1>
    <p class="sub" id="sub">Enter a new password for your account</p>
    <div id="msg"></div>
    <form id="form">
      <div class="inp"><label id="lbl1">New password</label><input type="password" id="p1" required minlength="6"></div>
      <div class="inp"><label id="lbl2">Repeat password</label><input type="password" id="p2" required></div>
      <button type="submit" id="btn">Save password</button>
    </form>
    <a href="/" class="link" id="home">← Back to home</a>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

    // ⚠️ РЕАЛЬНЫЕ КЛЮЧИ!
    const SUPABASE_URL = 'https://fhcvikryaejtikcwjciu.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZoY3Zpa3J5YWVqdGlrY3dqY2l1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MTgzMDgsImV4cCI6MjA5Mzk5NDMwOH0.PXXcf8VPxgT9hhkp3TiUJ5r5L7LKC3qYMDKFlzwcoIk'

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    // ── Localization ──────────────────────────────────────────────────────────
    // Language by priority: ?lang= in the URL (passed by the app when requesting
    // the reset), then the saved app language (same-origin localStorage), then
    // the browser language, else English.
    const DICT = {
      en: { title: '🔐 New password', sub: 'Enter a new password for your account', l1: 'New password', l2: 'Repeat password', btn: 'Save password', saving: 'Saving…', mismatch: '❌ Passwords do not match', ok: '✅ Password changed! Redirecting…', err: '❌ Error: ', home: '← Back to home', doc: 'New password — Movie Tracker' },
      ru: { title: '🔐 Новый пароль', sub: 'Введите новый пароль для вашего аккаунта', l1: 'Новый пароль', l2: 'Повторите пароль', btn: 'Сохранить пароль', saving: 'Сохранение…', mismatch: '❌ Пароли не совпадают', ok: '✅ Пароль изменён! Перенаправляем…', err: '❌ Ошибка: ', home: '← Вернуться на главную', doc: 'Новый пароль — Movie Tracker' },
      uk: { title: '🔐 Новий пароль', sub: 'Введіть новий пароль для вашого акаунта', l1: 'Новий пароль', l2: 'Повторіть пароль', btn: 'Зберегти пароль', saving: 'Збереження…', mismatch: '❌ Паролі не збігаються', ok: '✅ Пароль змінено! Перенаправляємо…', err: '❌ Помилка: ', home: '← На головну', doc: 'Новий пароль — Movie Tracker' },
    }

    function pickLang() {
      let saved = null
      try { saved = localStorage.getItem('language') } catch {}
      const url = new URLSearchParams(location.search).get('lang')
      const nav = (navigator.language || 'en')
      const code = (url || saved || nav || 'en').slice(0, 2)
      return DICT[code] ? code : 'en'
    }

    const L = DICT[pickLang()]
    document.documentElement.lang = pickLang()
    document.title = L.doc
    document.getElementById('title').textContent = L.title
    document.getElementById('sub').textContent = L.sub
    document.getElementById('lbl1').textContent = L.l1
    document.getElementById('lbl2').textContent = L.l2
    document.getElementById('btn').textContent = L.btn
    document.getElementById('home').textContent = L.home

    const form = document.getElementById('form')
    const msg = document.getElementById('msg')
    const btn = document.getElementById('btn')

    form.addEventListener('submit', async e => {
      e.preventDefault()
      const p1 = document.getElementById('p1').value
      const p2 = document.getElementById('p2').value

      if (p1 !== p2) {
        msg.innerHTML = `<div class="err">${L.mismatch}</div>`
        return
      }

      btn.disabled = true
      btn.textContent = L.saving

      try {
        const { error } = await supabase.auth.updateUser({ password: p1 })

        if (error) {
          msg.innerHTML = `<div class="err">${L.err}${error.message}</div>`
          btn.disabled = false
          btn.textContent = L.btn
        } else {
          msg.innerHTML = `<div class="ok">${L.ok}</div>`
          setTimeout(() => location.href = '/', 2000)
        }
      } catch (err) {
        msg.innerHTML = `<div class="err">${L.err}${err.message}</div>`
        btn.disabled = false
        btn.textContent = L.btn
      }
    })
  </script>
</body>
</html>
